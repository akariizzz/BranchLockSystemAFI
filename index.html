<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        if (!localStorage.getItem('afi_user')) {
            window.location.href = 'login.html';
        }
    </script>

    <title>AFI - Branch Lock Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; }
        .btn-primary { background-color: #0056b3; border: none; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-placeholder { max-width: 150px; height: auto; }
        #statusMessage { font-weight: 500; border-radius: 10px; }
        .table-responsive { max-height: 500px; overflow-y: auto; }
        .active-user-badge { font-size: 0.9rem; padding: 8px 15px; }
        .form-label { font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="mainSystem" class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="badge bg-white text-dark border shadow-sm active-user-badge">
                <i class="bi bi-person-circle text-primary me-2"></i>
                Logged in as: <span id="activeUserDisplay" class="fw-bold text-primary"></span>
            </span>
            <button onclick="logout()" class="btn btn-danger btn-sm shadow-sm">
                <i class="bi bi-box-arrow-right"></i> Logout System
            </button>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="logo-container">
                    <img src="Images/AFI Logo.png" alt="AFI Logo" class="logo-placeholder">
                    <h3 class="mt-2 fw-bold text-dark text-uppercase">Annapolis Finance</h3>
                    <p class="text-muted small">Centralized Borrower Lock System</p>
                </div>
                
                <div class="card shadow p-4 mb-5 border-top border-primary border-4">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Product Category</label>
                            <select id="productSelect" class="form-select">
                                <option value="Motorcycle">Motorcycle</option>
                                <option value="Tricycle">Tricycle</option>
                                <option value="Motorcycle with Sidecar">Motorcycle with Sidecar</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Surname</label>
                            <input type="text" id="surname" class="form-control" placeholder="e.g., DELA CRUZ">
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">First Name</label>
                            <input type="text" id="firstName" class="form-control" placeholder="e.g., JUAN">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label fw-bold">Middle Name</label>
                            <input type="text" id="middleName" class="form-control" placeholder="e.g., ARAGON">
                        </div>
                    </div>

                    <button onclick="checkAndLock()" class="btn btn-primary btn-lg w-100 mt-2 shadow">
                        <i class="bi bi-shield-lock-fill"></i> SECURE BRANCH LOCK
                    </button>
                    
                    <div id="statusMessage" class="mt-4 alert d-none"></div>
                </div>

                <div class="mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold text-secondary mb-0"><i class="bi bi-broadcast text-danger"></i> Live Monitor</h5>
                        <small class="text-muted" id="refreshTimer">Updating in 30s...</small>
                    </div>

                    <div class="input-group mb-3 shadow-sm">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="tableSearch" class="form-control" placeholder="Search Borrower Name or Branch..." onkeyup="filterTable()">
                    </div>

                    <div class="table-responsive bg-white rounded shadow border">
                        <table class="table table-hover mb-0 text-center align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 35%;">Borrower Name</th>
                                    <th>Product</th>
                                    <th>Branch</th>
                                    <th>Officer</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="lockTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="requestToast" class="toast hide border-warning shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-warning text-dark">
                <i class="bi bi-bell-fill me-2"></i>
                <strong class="me-auto">New Transfer Request</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body bg-white">
                A branch is requesting a borrower transfer. Please check the Live Monitor.
            </div>
        </div>
    </div>

    <audio id="requestAlert" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    
    <script>
        const user = localStorage.getItem('afi_user');
        if (user) { document.getElementById('activeUserDisplay').innerText = user; }
        
        loadLockedList();
        startRefreshTimer();
    </script>
</body>
</html>
