<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFI - Staff Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; }
        .logo-placeholder { max-width: 150px; height: auto; }
    </style>
</head>
<body>
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="text-center mb-4">
                    <img src="Images/AFI Logo.png" alt="AFI Logo" class="logo-placeholder">
                    <h3 class="mt-2 fw-bold">AFI Staff Login</h3>
                </div>
                <div class="card shadow-sm p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" id="loginUser" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" id="loginPass" class="form-control">
                    </div>
                    <button onclick="handleLogin()" class="btn btn-primary w-100 py-2">LOG IN</button>
                    <div id="loginError" class="text-danger mt-3 text-center d-none">Invalid credentials.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
